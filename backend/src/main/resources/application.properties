spring.application.name=backend

# Đọc cấu hình từ biến môi trường
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/book_review_db}
spring.datasource.username=${DB_USER:nguyenphuongtra}
spring.datasource.password=${DB_PASSWORD:tra24082005}

# Cấu hình Hibernate
spring.jpa.hibernate.ddl-auto=update 
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CORS cho môi trường cloud
cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Content-Type,Authorization
cors.allow-credentials=true
